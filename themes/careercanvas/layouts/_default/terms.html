{{ define "main" }}
<section class="py-16 bg-bg dark:bg-bg">
  <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-8 text-text-primary dark:text-text-primary">{{ .Title }}</h1>
    
    <ul class="grid grid-cols-1 md:grid-cols-1 lg:grid-cols-1 gap-4">
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}" 
             class="flex items-center px-4 py-2 bg-bg-secondary dark:bg-bg-tertiary text-text-primary dark:text-text-primary border border-border-primary dark:border-border-primary rounded-xl hover:bg-primary hover:text-white dark:hover:bg-primary transition-all duration-300 shadow-sm">
            <span class="font-medium">
              #{{ .Data.Term }}
            </span>
          </a>
        </li>
      {{ end }}
    </ul>
	
  </div>
</section>
{{ end }}
