<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>{{ if .IsHome }}{{ .Site.Title }} | {{ .Site.Params.tagline }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta name="author" content="{{ .Site.Params.author | default .Site.Params.name }}" />
<link rel="canonical" href="{{ .Permalink }}" />

<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }} | {{ .Site.Params.tagline }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}" />
<meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
{{ $og_image := .Params.featured_image | default .Params.og_image | default .Site.Params.og_image }}
{{ if $og_image }}
<!-- OG ve Twitter görsel yolları da absURL ile mutlak yola dönüştürüldü -->
<meta property="og:image" content="{{ $og_image | absURL }}"><meta property="twitter:image" content="{{ $og_image | absURL }}">
{{ end }}
<meta property="og:image:width" content="1200" /><meta property="og:image:height" content="630" /><meta property="og:site_name" content="{{ .Site.Title }}" /><meta name="twitter:card" content="summary_large_image" />

<!-- Favicon tam yolu -->
<link rel="icon" href="{{ "favicon.ico" | absURL }}" />

<!-- CSS dosyaları tam yolu -->
<link rel="stylesheet" href="{{ "css/vendor/all.min.css" | absURL }}">
<link rel="stylesheet" href="{{ "css/vendor/devicon.min.css" | absURL }}">

<!-- JS dosyaları tam yolu -->
<script defer src="{{ "js/vendor/gsap.min.js" | absURL }}"></script>
<script defer src="{{ "js/vendor/ScrollTrigger.min.js" | absURL }}"></script>

{{ if .Params.math }}
  <!-- KaTeX dosyaları tam yolu -->
  <link rel="stylesheet" href="{{ "css/vendor/katex.min.css" | absURL }}">
  <script defer src="{{ "js/vendor/katex.min.js" | absURL }}"></script>

  <script defer src="{{ "js/vendor/auto-render.min.js" | absURL }}" 
          onload="renderMathInElement(document.body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ]
          });">
  </script>
{{ end }}
